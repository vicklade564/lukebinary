<!DOCTYPE html>
<html>
<head>
  <title>Trade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <div>Trade</div>
  <div>$1000</div>
</div>

<div class="center">
  <div class="card">
    <h3>Choose Prediction</h3>

    <input id="amount" placeholder="Amount" style="width:100%;padding:10px;margin-top:10px;">

    <button class="btn green" onclick="trade('even')">EVEN</button>
    <button class="btn red" onclick="trade('odd')">ODD</button>
  </div>
</div>

<script>
function trade(choice){
  localStorage.setItem("choice", choice);
  localStorage.setItem("amount", document.getElementById("amount").value || 0);
  window.location.href = "result.html";
}
</script>

</body>
</html>
